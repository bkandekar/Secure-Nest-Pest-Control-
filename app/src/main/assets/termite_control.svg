<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="barrierGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" stroke-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Solid Dark Slate Canvas -->
  <rect width="600" height="400" fill="url(#bgGrad)" />
  <!-- Grid pattern overlay for high-tech look -->
  <rect width="600" height="400" fill="url(#grid)" />

  <!-- Shield Shape Backdrop -->
  <path d="M 300,50 L 420,100 V 220 C 420,300 300,360 300,360 C 300,360 180,300 180,220 V 100 Z" fill="#1E293B" fill-opacity="0.6" stroke="#475569" stroke-width="2" />

  <!-- Subterranean Soil Barrier Layer -->
  <rect x="100" y="280" width="400" height="80" rx="12" fill="#292524" stroke="#44403c" stroke-width="2" />
  <rect x="100" y="280" width="400" height="20" fill="url(#barrierGrad)" />
  
  <!-- Subterranean injection points / barrier shield pulses -->
  <g stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6">
    <line x1="150" y1="280" x2="150" y2="340" />
    <line x1="225" y1="280" x2="225" y2="340" />
    <line x1="300" y1="280" x2="300" y2="340" />
    <line x1="375" y1="280" x2="375" y2="340" />
    <line x1="450" y1="280" x2="450" y2="340" />
  </g>
  <!-- Injection Liquid Drips/Beads -->
  <circle cx="150" cy="340" r="4" fill="#10B981" />
  <circle cx="225" cy="340" r="4" fill="#10B981" />
  <circle cx="300" cy="340" r="4" fill="#10B981" />
  <circle cx="375" cy="340" r="4" fill="#10B981" />
  <circle cx="450" cy="340" r="4" fill="#10B981" />

  <!-- ==================== HOUSE STRUCTURE ==================== -->
  <g transform="translate(195, 110)">
    <!-- Main House Frame (Golden Safety Outline) -->
    <path d="M 105,20 L 190,95 V 170 H 20 V 95 Z" fill="#1E293B" stroke="#E9C46A" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Wooden Pillars inside the house representation -->
    <rect x="50" y="110" width="12" height="60" fill="url(#woodGrad)" stroke="#451a03" stroke-width="1" />
    <rect x="100" y="110" width="12" height="60" fill="url(#woodGrad)" stroke="#451a03" stroke-width="1" />
    <rect x="148" y="110" width="12" height="60" fill="url(#woodGrad)" stroke="#451a03" stroke-width="1" />
    <!-- Horizontal wood beam -->
    <rect x="40" y="98" width="130" height="12" fill="url(#woodGrad)" stroke="#451a03" stroke-width="1" />

    <!-- Protected House Shield Indicator Overlay -->
    <path d="M 105,45 L 160,95 V 150 H 50 V 95 Z" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5 3" />
    <circle cx="105" cy="115" r="22" fill="#10B981" fill-opacity="0.2" />
    <!-- Lock Icon inside the center circle representing ultimate safety -->
    <rect x="97" y="111" width="16" height="12" rx="2" fill="#10B981" />
    <path d="M 101,111 V 106 A 4,4 0 0,1 109,106 V 111" fill="none" stroke="#10B981" stroke-width="2" />
  </g>

  <!-- ==================== SUBTERRANEAN TERMITE (Banned / Blocked) ==================== -->
  <g transform="translate(140, 310) scale(0.9)">
    <!-- Termite insect drawing -->
    <!-- Segments -->
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#78716c" />
    <ellipse cx="14" cy="0" rx="7" ry="5" fill="#78716c" />
    <ellipse cx="26" cy="0" rx="6" ry="6" fill="#a8a29e" />
    <!-- Legs -->
    <path d="M 0,-4 Q -4,-12 -8,-14" fill="none" stroke="#44403c" stroke-width="2" />
    <path d="M 12,-3 Q 12,-11 8,-13" fill="none" stroke="#44403c" stroke-width="2" />
    <path d="M 0,4 Q -4,12 -8,14" fill="none" stroke="#44403c" stroke-width="2" />
    <path d="M 12,3 Q 12,11 8,14" fill="none" stroke="#44403c" stroke-width="2" />
    <!-- Antennae -->
    <path d="M 31,-3 Q 36,-6 40,-5" fill="none" stroke="#44403c" stroke-width="1.5" />
    <path d="M 31,3 Q 36,6 40,5" fill="none" stroke="#44403c" stroke-width="1.5" />

    <!-- Prohibition Red Circle with Slash -->
    <circle cx="12" cy="0" r="22" fill="none" stroke="#EF4444" stroke-width="5" />
    <line x1="-3" y1="-15" x2="27" y2="15" stroke="#EF4444" stroke-width="5" />
  </g>

  <!-- ==================== BADGES & TEXTS ==================== -->
  <!-- Verification Badge -->
  <g transform="translate(30, 30)">
    <rect width="170" height="32" rx="16" fill="#1E293B" stroke="#E9C46A" stroke-width="1.5" />
    <circle cx="20" cy="16" r="8" fill="#10B981" />
    <!-- Checkmark -->
    <path d="M 17 16 L 19 18 L 23 14" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
    <text x="36" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#E2E8F0" letter-spacing="0.5">SHIELD BARRIER</text>
  </g>
  
  <g transform="translate(430, 30)">
    <rect width="140" height="32" rx="16" fill="#9B2226" />
    <text x="70" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="black" fill="#FFFFFF" letter-spacing="1" text-anchor="middle">TERMITE SHIELD</text>
  </g>
</svg>
